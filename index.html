<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Sales & BD Playbook — Professional Learning</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0d0b;--bg2:#131613;--bg3:#191d19;--bg4:#20251f;--bg5:#282d27;
  --tx:#ecf0eb;--tx2:#b4bfb3;--tx3:#727a70;
  --bdr:rgba(255,255,255,0.07);--bdr2:rgba(255,255,255,0.14);
  --green2:#7ab890;--green3:#4a9464;
  --green:#4a9464;--blue:#4878a8;--red:#a84848;--amber:#c8a040;
  --r:14px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth;font-size:16px}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;line-height:1.6;min-height:100vh}
button,a{cursor:pointer;font-family:'Inter',sans-serif}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:2px}

/* === SCREENS === */
.screen{display:none}.screen.active{display:block}

/* === HEADER === */

.hdr-logo{font-family:'Playfair Display',serif;font-size:15px;color:var(--tx);white-space:nowrap}
.hdr-logo span{color:var(--green2)}
.hdr-search{
  flex:1;display:flex;align-items:center;gap:8px;
  background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rs);
  padding:0 10px;height:34px;
}
.hdr-search input{flex:1;background:none;border:none;outline:none;color:var(--tx);font-size:13.5px;font-family:'Inter',sans-serif}
.hdr-search input::placeholder{color:var(--tx3)}
.hdr-search .sico{color:var(--tx3);font-size:12px}

/* === BACK BAR (prominent) === */
.back-bar{
  display:flex;align-items:center;gap:0;
  background:var(--bg2);border-bottom:1px solid var(--bdr);
  padding:0;
}
.back-btn-big{
  display:flex;align-items:center;gap:8px;
  padding:11px 16px;
  background:none;border:none;color:var(--tx2);font-size:13px;font-weight:500;
  transition:color .15s;
}
.back-btn-big:hover{color:var(--tx)}
.back-btn-big .arr{font-size:16px;color:var(--green2)}
.back-bar-title{font-size:13px;color:var(--tx3);padding-right:16px;margin-left:auto}

/* === HOME SCREEN === */
.home-hero{
  padding:24px 16px 20px;border-bottom:1px solid var(--bdr);
  position:relative;overflow:hidden;
}
.home-hero::before{
  content:'';position:absolute;top:-60px;right:-80px;
  width:240px;height:240px;border-radius:50%;
  background:radial-gradient(circle,rgba(74,148,100,.10) 0%,transparent 70%);
  pointer-events:none;
}
.hero-tag{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--green2);margin-bottom:8px}
.hero-h{font-family:'Playfair Display',serif;font-size:28px;line-height:1.2;color:var(--tx);margin-bottom:6px}
.hero-h em{color:var(--green2);font-style:italic}
.hero-p{font-size:13px;color:var(--tx2);line-height:1.65;margin-bottom:16px}
.hero-stats{display:flex;gap:18px}
.hstat{display:flex;flex-direction:column;gap:1px}
.hstat-n{font-family:'Playfair Display',serif;font-size:22px;color:var(--tx)}
.hstat-l{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3)}

/* === PROGRESS === */
.prog-strip{padding:12px 16px;border-bottom:1px solid var(--bdr)}
.prog-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.prog-label{font-size:11px;color:var(--tx3)}
.prog-pct{font-size:11px;color:var(--green2);font-weight:600}
.prog-track{height:3px;background:var(--bg5);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width .5s}
.prog-meta{display:flex;gap:14px;margin-top:8px}
.pmeta{display:flex;align-items:center;gap:4px;font-size:10.5px;color:var(--tx3)}
.pmeta-dot{width:6px;height:6px;border-radius:50%}

/* === SECTION LABEL === */
.sec-lbl{padding:14px 16px 8px;font-size:9.5px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--tx3)}

/* === CATEGORY GRID === */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:0 16px}
.ccard{
  background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);
  padding:13px;cursor:pointer;transition:border-color .15s,transform .1s;
  position:relative;overflow:hidden;
}
.ccard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ca);opacity:.9}
.ccard:active{transform:scale(.97)}
.ccard-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:7px}
.ccard-icon{font-size:20px;line-height:1}
.ccard-count{font-size:10px;font-weight:700;color:var(--ca);background:rgba(255,255,255,.06);padding:2px 6px;border-radius:8px}
.ccard-name{font-size:12.5px;font-weight:600;color:var(--tx);line-height:1.35;margin-bottom:7px}
.ccard-pb{height:3px;background:var(--bg5);border-radius:2px;overflow:hidden}
.ccard-pf{height:100%;border-radius:2px;transition:width .4s}

/* === TOPIC LIST (category screen) === */
.tlist{padding:4px 0}
.titem{
  display:flex;align-items:flex-start;gap:10px;
  padding:13px 16px;border-bottom:1px solid var(--bdr);
  cursor:pointer;transition:background .12s;
}
.titem:hover{background:var(--bg2)}
.titem-num{font-size:10px;font-weight:700;color:var(--tx3);min-width:20px;margin-top:3px;text-align:right;flex-shrink:0}
.titem-body{flex:1;min-width:0}
.titem-title{font-size:14px;font-weight:600;color:var(--tx);line-height:1.35;margin-bottom:3px}
.titem-intro{font-size:12.5px;color:var(--tx3);font-style:italic;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.titem-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.rdot{width:8px;height:8px;border-radius:50%;background:var(--bg5);margin-top:3px;flex-shrink:0}
.rdot.read{background:var(--green)}
.rdot.bkm{background:var(--amber)}
.titem-arr{font-size:12px;color:var(--tx3)}

/* === READING PAGE === */
.reading-wrap{padding:0}
.reading-hero{
  padding:20px 16px 16px;border-bottom:1px solid var(--bdr);
  position:relative;
}
.reading-cat-tag{
  display:inline-flex;align-items:center;gap:6px;
  font-size:10.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:var(--tx3);margin-bottom:10px;
}
.reading-cat-tag .dot{width:6px;height:6px;border-radius:50%}
.reading-title{font-family:'Playfair Display',serif;font-size:22px;line-height:1.25;color:var(--tx);margin-bottom:8px}
.reading-intro{font-size:13.5px;color:var(--tx2);line-height:1.7;font-style:italic}

/* === READING ACTIONS (sticky at bottom) === */
.reading-actions{
  position:sticky;
  bottom:60px;
  z-index:50;
  background:rgba(11,13,11,0.99);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-top:1px solid var(--bdr2);
  border-bottom:1px solid var(--bdr);
  padding:10px 16px;
  display:flex;
  align-items:center;
  gap:8px;
  /* Ensure it never exceeds the column */
  max-width:720px;
  width:100%;
  /* On desktop the app-shell is 720px so this is already correct.
     The transform trick was causing the misalignment. */
}
.btn-read{
  padding:9px 16px;
  background:transparent;color:var(--tx2);
  border:1px solid var(--bdr2);
  border-radius:var(--rs);font-size:12.5px;font-weight:500;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:all .15s;white-space:nowrap;
}
.btn-read:hover{color:var(--tx);border-color:var(--bdr2)}
.btn-read.done{
  background:rgba(74,148,100,.15);border-color:var(--green);
  color:#6ec990;
}
.btn-bkm{
  padding:9px 11px;background:transparent;border:1px solid var(--bdr2);border-radius:var(--rs);
  font-size:16px;transition:all .15s;color:var(--tx3);
}
.btn-bkm.on{background:rgba(74,148,100,.10);border-color:var(--green2);color:var(--green2)}
.btn-nav-prev{
  padding:9px 13px;background:var(--bg3);border:1px solid var(--bdr2);border-radius:var(--rs);
  color:var(--tx2);font-size:14px;font-weight:600;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;
}
.btn-nav-prev:hover{color:var(--tx)}
.btn-nav-prev:disabled{opacity:.25;cursor:not-allowed}
.btn-nav-next{
  flex:1;padding:9px 12px;
  background:var(--green);color:var(--bg);border:none;
  border-radius:var(--rs);font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:4px;
  transition:opacity .15s;min-width:0;
}
.btn-nav-next:hover{opacity:.9}
.btn-nav-next:disabled{opacity:.2;cursor:not-allowed;background:var(--bg4);color:var(--tx3)}

/* === READING CONTENT === */
.rcontent{padding:0}

.rsection{
  padding:16px 16px 0;margin-bottom:0;
  border-bottom:1px solid var(--bdr);
  padding-bottom:16px;
}
.rsection:last-child{border-bottom:none}
.rsec-label{
  font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:var(--green2);opacity:.65;margin-bottom:9px;
  display:flex;align-items:center;gap:7px;
}
.rsec-label::after{content:'';flex:1;height:1px;background:var(--bdr)}
.rsec-body{font-size:14.5px;color:var(--tx);line-height:1.8}
.rsec-body strong{color:var(--green2);font-weight:600}
.rsec-body em{font-style:italic;color:var(--tx2)}

/* Key points */
.kpts{list-style:none;margin-top:4px}
.kpts li{
  display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--bdr);
  font-size:13.5px;color:var(--tx2);line-height:1.65;
}
.kpts li:last-child{border-bottom:none}
.kpts li strong{color:var(--tx);font-weight:600}
.kpts .pn{font-size:9.5px;font-weight:700;color:var(--green2);min-width:16px;margin-top:5px;flex-shrink:0}

/* Scenario box */
.scenario{
  background:rgba(212,146,74,.06);
  border:1px solid rgba(62,168,90,.18);
  border-left:3px solid var(--amber);
  border-radius:0 var(--rs) var(--rs) 0;
  padding:13px 14px;font-size:14px;color:var(--tx);line-height:1.75;
}
.scenario strong{color:var(--green2);font-weight:600}
.scenario-ans{
  margin-top:10px;padding-top:10px;border-top:1px dashed rgba(74,148,100,.22);
  font-size:13.5px;color:var(--green2);font-weight:500;line-height:1.65;
}

/* Law chip */
.lawchip{
  display:inline-block;font-size:12.5px;color:var(--tx2);font-style:italic;
  background:var(--bg3);border:1px solid var(--bdr2);border-radius:6px;padding:7px 12px;line-height:1.6;
}

/* Diagram */
.diagram-wrap{
  background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);
  padding:16px;overflow-x:auto;margin:4px 0;
}
.diagram-wrap svg{max-width:100%;height:auto;display:block;margin:0 auto}

/* Key takeaway */
.takeaway{
  background:rgba(74,148,100,.07);border:1px solid rgba(74,148,100,.2);
  border-radius:var(--r);padding:14px 16px;
  font-size:14px;color:var(--tx);line-height:1.75;
}
.takeaway-lbl{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--green);margin-bottom:7px;opacity:.9}

/* Mistakes */
.mistake-list{list-style:none;background:rgba(168,72,72,.05);border:1px solid rgba(168,72,72,.15);border-radius:var(--rs);padding:4px 12px}
.mistake-list li{
  display:flex;gap:8px;padding:9px 0;border-bottom:1px solid rgba(168,72,72,.1);
  font-size:13.5px;color:var(--tx);line-height:1.65;
}
.mistake-list li:last-child{border-bottom:none}
.mico{font-size:13px;margin-top:2px;flex-shrink:0}

/* === SEARCH RESULTS === */
.search-meta{padding:10px 16px;font-size:12.5px;color:var(--tx3);border-bottom:1px solid var(--bdr)}
.search-meta strong{color:var(--tx2)}

/* === BOOKMARKS SCREEN === */
.empty-state{padding:60px 16px;text-align:center}
.empty-ico{font-size:40px;opacity:.3;margin-bottom:12px}
.empty-msg{font-size:14px;color:var(--tx3);line-height:1.6}

/* === TOPIC NAV STRIP === */
.tnav{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;border-top:1px solid var(--bdr);
  font-size:12px;color:var(--tx3);
}
.tnav strong{color:var(--tx2)}

/* marks */
mark{background:rgba(74,148,100,.2);border-radius:2px;padding:0 1px;color:inherit}

/* spacer */
.spacer{height:14px}

/* ═══════════════════════════════════════════════
   DESKTOP LAYOUT — centered reading column
═══════════════════════════════════════════════ */

/* ── Core shell constraint ── */
.app-shell{
  max-width:720px;
  margin:0 auto;
  min-height:100vh;
  padding-bottom:32px;
  position:relative;
  z-index:1;
}

/* ── Header: full-width bar, centered content ── */
.hdr{
  position:sticky;top:0;z-index:200;
  width:100%;
  background:rgba(11,13,11,0.97);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bdr);
}
.hdr-inner{
  max-width:720px;
  margin:0 auto;
  display:flex;
  align-items:center;
  gap:10px;
  height:44px;
  padding:0 16px;
}



/* ── Desktop-specific enhancements ── */
@media(min-width:769px){
  body{
    background:#080a08;
  }
  /* Ambient depth on either side of the column */
  body::before{
    content:'';
    position:fixed;
    top:0;left:0;right:0;bottom:0;
    background:radial-gradient(ellipse 60% 100% at 50% 0%, rgba(74,148,100,.04) 0%, transparent 70%);
    pointer-events:none;
    z-index:0;
  }
  .app-shell{
    background:var(--bg);
    box-shadow:
      0 0 0 1px rgba(255,255,255,.05),
      0 0 60px rgba(0,0,0,.8),
      0 0 120px rgba(0,0,0,.5);
  }

}

@media(max-width:768px){
  .app-shell{padding-bottom:24px}
  .hdr-inner{padding:0 14px}
}

/* Toolbar visual alignment — matches content padding */
@media(min-width:769px){
  .reading-actions{
    /* Already constrained by app-shell's 720px max-width.
       Give it the same side padding as content so buttons
       align with the text above. */
    padding:10px 20px;
  }
  .tnav{
    padding:8px 20px;
  }
}

/* === SAVED HERO BUTTON === */
.saved-hero-btn{
  display:flex;flex-direction:column;align-items:center;gap:1px;
  background:rgba(200,80,80,.1);
  border:1px solid rgba(200,80,80,.25);
  border-radius:10px;
  padding:7px 12px;
  cursor:pointer;
  transition:all .15s;
}
.saved-hero-btn:hover{background:rgba(200,80,80,.18);border-color:rgba(200,80,80,.4)}
.saved-ico{font-size:18px;line-height:1;margin-bottom:1px}
.saved-ct{font-family:'Playfair Display',serif;font-size:22px;color:#e07070;line-height:1.1}
.saved-hero-btn .hstat-l{color:#c07070}



/* === UPDATED READING ACTIONS === */
.btn-alltopics{
  padding:8px 13px;
  background:rgba(74,148,100,.12);
  border:1px solid rgba(74,148,100,.3);
  border-radius:20px;
  color:var(--green2);
  font-size:12px;font-weight:600;
  white-space:nowrap;flex-shrink:0;
  transition:all .15s;
}
.btn-alltopics:hover{background:rgba(74,148,100,.2);border-color:var(--green2)}
.btn-read{
  padding:9px 12px;
  background:transparent;color:var(--tx3);
  border:1px solid var(--bdr2);
  border-radius:var(--rs);font-size:11.5px;font-weight:600;
  flex-shrink:0;white-space:nowrap;
  transition:all .15s;
}
.btn-read:hover{color:var(--tx)}
.btn-read.done{
  background:rgba(74,148,100,.15);border-color:var(--green);
  color:#6ec990;
}

/* === PERSISTENT SEARCH (below progress, home only) === */
.persistent-search{
  padding:0 16px 14px;
  background:var(--bg);
}
.psearch-inner{
  display:flex;align-items:center;gap:8px;
  background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;
  padding:0 12px;height:36px;max-width:400px;
  transition:border-color .15s;
}
.psearch-inner:focus-within{border-color:var(--bdr2)}
.psearch-inner .sico{color:var(--tx3);font-size:13px;flex-shrink:0}
.psearch-inner input{
  flex:1;background:none;border:none;outline:none;
  color:var(--tx);font-size:13.5px;font-family:'Inter',sans-serif;
}
.psearch-inner input::placeholder{color:var(--tx3)}

/* === INLINE SEARCH RESULTS META === */
.search-meta-inline{
  padding:10px 16px 6px;
  font-size:12.5px;color:var(--tx3);
  border-bottom:1px solid var(--bdr);
}
.search-meta-inline strong{color:var(--tx2)}

/* Force dark background on search inputs (browser reset) */
input[type="search"]{
  -webkit-appearance:none;
  appearance:none;
  background:transparent;
  color-scheme:dark;
}
input[type="search"]::-webkit-search-cancel-button{
  -webkit-appearance:none;
}
</style>
</head>
<body>

<div class="hdr" id="hdr" role="banner">
  <div class="hdr-inner">
    <div class="hdr-logo">Sales & <span>BD Playbook</span></div>
  </div>
</div>

<div class="app-shell">
<!-- SCREENS -->
<div class="screen active" id="screen-home">
  <div id="home-static"></div>
  <div id="home-dynamic"></div>
</div>
<div class="screen" id="screen-category"></div>
<div class="screen" id="screen-topic"></div>
<div class="screen" id="screen-bookmarks"></div>
<div class="screen" id="screen-search"></div>

<!-- BOTTOM NAV -->
</div><!-- /app-shell -->

<script>
'use strict';

// ═══════════════════════════════════════════════
// DATA — CATEGORIES & TOPICS
// ═══════════════════════════════════════════════

const CATS = [
  {id:'bd-foundations',   name:'BD Foundations',           icon:'🎯', accent:'#d4924a'},
  {id:'account-mgmt',     name:'Account Management',       icon:'🤝', accent:'#4a9464'},
  {id:'marketplace',      name:'Marketplace Strategy',     icon:'🛒', accent:'#4878a8'},
  {id:'campaigns',        name:'Campaign & GMV Growth',    icon:'🚀', accent:'#9a5adc'},
  {id:'performance-mktg', name:'Performance Marketing',    icon:'📊', accent:'#5ab8b8'},
  {id:'livestream',       name:'Livestream Commerce',      icon:'🎥', accent:'#dc5a9a'},
  {id:'data-analytics',   name:'Data & Analytics',         icon:'🔢', accent:'#5a9adc'},
  {id:'pitching',         name:'Pitching & New Business',  icon:'💡', accent:'#c8b85a'},
  {id:'negotiation',      name:'Negotiation & Contracts',  icon:'📝', accent:'#dc7a5a'},
  {id:'stakeholders',     name:'Stakeholder Management',   icon:'🧭', accent:'#6ab87a'},
  {id:'ops-supply',       name:'Operations & Supply Chain',icon:'📦', accent:'#a85adc'},
  {id:'content-seo',      name:'Content & SEO',            icon:'✍️', accent:'#5adcb8'},
  {id:'leadership',       name:'Team Leadership',          icon:'👥', accent:'#dc9a5a'},
  {id:'strategy',         name:'Commercial Strategy',      icon:'♟️', accent:'#7a9adc'},
];

const TOPICS = {

'bd-foundations': [
  {id:'bdf1', title:'What Business Development Actually Means',
   intro:'BD is not just sales. It is the systematic expansion of commercial value through new accounts, new channels, and deeper existing relationships.',
   concept:'Business development sits at the intersection of strategy, sales, and relationship management. It is the function responsible for identifying and unlocking new sources of revenue and growth.',
   rule:'BD operates across three horizons: (1) Acquiring new accounts, (2) Expanding existing accounts, (3) Building platforms for future growth. All three matter — most people only focus on the first.',
   explanation:'The distinction from pure sales: sales closes deals on existing opportunities. BD creates the opportunities — through market mapping, partner development, and channel building.',
   why:'Without BD, an organisation only monetises what it already has. With BD, it systematically expands its addressable market.',
   hrbp:'The most effective BD practitioners in e-commerce split their time roughly: 30% new account acquisition, 50% existing account growth (where GMV actually lives), 20% platform and channel development.',
   mistakes:['Treating BD as pure new account sales — ignoring the 50% growth opportunity within existing accounts','No account tiering — spending equal time on RM50k accounts and RM5M accounts'],
   scenario:'A BD manager has 20 brand accounts. 3 generate 80% of GMV. How should she allocate time? Answer: Tier the portfolio. Top 3 = strategic accounts requiring weekly engagement. Middle tier = monthly. Long tail = quarterly reviews or self-serve.',
   takeaway:'BD is portfolio management, not just hunting. Know which accounts have growth potential, which need protection, and which to rationalise.'},

  {id:'bdf2', title:'The Consultative BD Approach',
   intro:'Transactional selling dies the moment a better offer appears. Consultative BD creates dependency through value.',
   concept:'Consultative BD means positioning yourself as a strategic partner to the client — understanding their business deeply enough to proactively identify growth opportunities they have not yet seen.',
   rule:'The consultative approach: Diagnose (understand the brand\'s actual situation) → Prescribe (recommend a course of action) → Execute (deliver on the plan) → Review (close the loop with data).',
   explanation:'Most BD managers skip straight to prescribe — showing up with a campaign pitch before understanding the brand\'s inventory position, margin structure, or competitive context. This destroys credibility.',
   why:'Brands have many service providers pitching them. The one who understands their business best gets first right of refusal on new budgets.',
   hrbp:'At Shopee, the most effective Relationship Managers ran quarterly business reviews presenting data on the brand\'s performance vs category benchmarks and arrived with pre-built proposals. This is consultative BD in practice.',
   mistakes:['Pitching without diagnostics — recommending solutions before understanding the problem','QBRs that are backward-looking reports, not forward-looking proposals'],
   scenario:'A beauty brand\'s conversion rate is 2.8% vs category average of 4.1%. What do you recommend before suggesting any ad spend? Answer: Diagnose the conversion gap first — likely a listing quality issue, not a traffic issue. Fix the funnel before buying more traffic.',
   takeaway:'Diagnose before you prescribe. The brand that trusts your diagnosis buys your prescription. Arrive with data about their business, not just your product catalogue.'},

  {id:'bdf3', title:'BD Pipeline Management',
   intro:'Unpredictable BD output is almost always a pipeline management failure, not a talent failure.',
   concept:'A BD pipeline is a structured view of all opportunities at different stages — from prospect to active account. Managing the pipeline means managing future revenue.',
   rule:'Pipeline stages: Prospect → Qualified → Proposal Sent → Negotiation → Won/Closed. Each stage needs a clear definition, target conversion rate, and maximum time-in-stage before escalation.',
   explanation:'Two most common pipeline failures: (1) Top-heavy pipeline — too many prospects, too few in negotiation, because qualification is weak. (2) Stale pipeline — opportunities sitting in the same stage for months.',
   why:'Without pipeline visibility, BD output is unpredictable. With it, you can forecast revenue 60-90 days ahead and identify where to focus effort.',
   hrbp:'Weekly pipeline reviews should focus on: what moved forward, what is stuck and why, and what needs to be dropped to make room for fresher opportunities.',
   mistakes:['Counting all prospects as pipeline — they are not pipeline until qualified','No time-in-stage limits — leads sit unactioned for weeks'],
   scenario:'BD manager has 40 opportunities in pipeline but consistently misses targets. Review shows 35 are in "Prospect" stage for 60+ days. Diagnosis? Answer: The pipeline is illusory — it is a prospect list. Cull the stale opportunities and tighten qualification criteria.',
   takeaway:'Pipeline does not equal prospect list. Qualified opportunities with clear next steps equals pipeline. Review stages weekly. Drop what is stale.'},

  {id:'bdf4', title:'The Value Proposition — What You Actually Sell',
   intro:'In e-commerce BD, you are rarely selling the platform. You are selling growth outcomes — GMV, market share, brand equity.',
   concept:'A value proposition is the specific, measurable outcome you promise a client in exchange for their commitment. It must be credible, differentiated, and relevant to their actual business objectives.',
   rule:'Effective value propositions: (1) The outcome (GMV, ranking, reach), (2) The mechanism (how you will achieve it), (3) The evidence (past results that make it credible). All three together.',
   explanation:'Generic pitches ("our platform has millions of users") lose to specific ones ("brands in your category that ran Super Brand Day with us saw an average 3.2× GMV uplift — here is the data").',
   why:'Brands are pitched constantly. Specificity and evidence cut through. Vague claims about platform scale are table stakes.',
   hrbp:'Kiehl\'s No.1 premium brand ranking on Shopee for 8 consecutive months is a value proposition asset — evidence of what a well-executed marketplace strategy delivers. Build a case study library from past wins.',
   mistakes:['Value propositions built around platform features, not client outcomes','No evidence layer — claims without data are noise'],
   scenario:'Pitching a luxury skincare brand on TikTok Shop. Their concern is brand equity dilution. How do you frame your value proposition? Answer: Lead with brand elevation, not volume. "Kiehl\'s achieved RM1M in a single campaign with a curated approach that maintained premium positioning while driving real commerce results."',
   takeaway:'Sell outcomes, not features. Outcomes plus evidence plus mechanism equals a compelling pitch. Without all three, you are just another vendor.'},

  {id:'bdf5', title:'Revenue vs Relationship — Getting the Balance Right',
   intro:'Pushing for short-term GMV at the expense of the relationship generates one good quarter then loses the account.',
   concept:'Sustainable BD requires balancing short-term revenue generation with long-term relationship investment. Both matter — neither alone is sufficient.',
   rule:'Rule of thirds for client time: 1/3 on commercial execution (campaigns, GMV), 1/3 on strategic conversations (brand\'s 12-month roadmap), 1/3 on relationship (trust, rapport, understanding the person).',
   explanation:'Brands do not defect to competitors because of product features. They defect because of relationship failures — they felt taken for granted, not consulted, or not heard.',
   why:'Client acquisition costs 5-7× more than client retention. The investment in relationship is a retention investment.',
   hrbp:'The accounts retained long-term at Shopee were not the ones receiving the most aggressive commercial pitches — they were the ones whose managers genuinely understood the brand\'s seasonal calendar, inventory constraints, and internal approval dynamics.',
   mistakes:['Contacting the client only when there is something to sell — transactional relationship','Over-promising campaign outcomes to win budget, then under-delivering and losing trust'],
   scenario:'A brand partner says "I feel like you only call me when you want something." How do you respond? Answer: Acknowledge it honestly. Restructure engagement: schedule a monthly strategic conversation with no commercial agenda. Arrive with market insights and competitive intelligence, not a pitch deck.',
   takeaway:'Relationships are the moat around your accounts. Invest in them proactively. The best protection against a competitor pitch is a client who feels genuinely valued.'},
],

'account-mgmt': [
  {id:'am1', title:'Account Tiering — Not All Accounts Are Equal',
   intro:'Treating a RM50k account the same way as a RM5M account is the fastest route to misallocated energy and missed growth.',
   concept:'Account tiering is the practice of segmenting your portfolio by value, strategic importance, and growth potential — then calibrating engagement intensity accordingly.',
   rule:'Tier 1 (Strategic): top 20% by GMV. Weekly engagement, dedicated growth plans, executive relationship. Tier 2 (Growth): 40%. Bi-weekly. Tier 3 (Maintenance): remaining 40%. Monthly or self-serve.',
   explanation:'The temptation is to spend disproportionate time on Tier 3 accounts because they generate the most noise. This starves Tier 1 accounts of the strategic attention that keeps them growing.',
   why:'Account tiering is a resource allocation discipline. Without it, you spend equal effort on unequal accounts.',
   hrbp:'At Momentum Commerce, managing brands like Wardah, Kiehl\'s, and Makeover simultaneously requires explicit tiering — Wardah (flagship, highest GMV) gets weekly strategy sessions, while smaller brands get structured monthly reviews.',
   mistakes:['No formal tiering — time allocated by whoever shouts loudest','Tier 1 accounts treated as operational accounts — only contacted about issues, never about strategy'],
   scenario:'You have 15 accounts. 2 generate 65% of GMV. How do you restructure your calendar? Answer: Block 50% of your week for those 2 accounts. The remaining 13 share the other 50%, tiered by growth potential.',
   takeaway:'Tier by value and potential, not by noise. Your biggest accounts deserve your best time, not whatever is left over after operational firefighting.'},

  {id:'am2', title:'The QBR — Quarterly Business Review Done Right',
   intro:'A QBR that is just a recap of last quarter\'s numbers is a report. A QBR that maps the next quarter\'s growth plan is a strategic conversation.',
   concept:'The Quarterly Business Review is the structured touchpoint where you review performance, align on strategy, and confirm the commercial relationship for the next period.',
   rule:'QBR structure: (1) Last quarter performance vs target (5 mins), (2) Market context (5 mins), (3) What worked and why (10 mins), (4) Next quarter plan with specific campaigns and GMV targets (20 mins), (5) Relationship check (5 mins).',
   explanation:'The performance section should contain no surprises — you should have been communicating performance throughout the quarter. The bulk of time is on the forward plan.',
   why:'QBRs are how you maintain strategic relevance and retain budget commitments. Without them, the relationship becomes purely operational.',
   hrbp:'Biweekly presentations to upper management at Momentum Commerce — the same discipline: arrive with a narrative, not just numbers. "Here is what we see, here is what it means, here is what we recommend."',
   mistakes:['QBR deck is all backward-looking data — no forward proposals','No action items at the end — QBR happens but nothing changes'],
   scenario:'Brand partner asks why their category share dropped 3 points last quarter. How do you frame this in the QBR? Answer: Acknowledge it directly. Present root cause analysis. Then present the remediation plan with timeline and ownership. Never hide unfavourable data.',
   takeaway:'QBR = 20% past, 80% future. Arrive with pre-built proposals. End with written action items and owners. The QBR is your most important retention tool.'},

  {id:'am3', title:'Client Health Scoring — Spotting Churn Before It Happens',
   intro:'By the time a client tells you they are leaving, the decision has usually been made. Health scoring gives you early warning.',
   concept:'Client health scoring is a systematic way to track account health across multiple signals: engagement frequency, GMV trajectory, campaign participation rate, responsiveness, and relationship sentiment.',
   rule:'Key health signals: GMV vs target, response time to communications, campaign participation rate, last executive contact date, NPS or relationship sentiment.',
   explanation:'Declining response time and reducing campaign participation are the two earliest and most reliable churn signals. They precede the formal "we\'re going with another agency" conversation by 2-3 months.',
   why:'Proactive retention is dramatically cheaper than reactive win-back. A client who is declining can be saved. A client who has already defected almost never returns.',
   hrbp:'Build a monthly health scorecard for all Tier 1 and Tier 2 accounts. Anything scoring amber triggers a proactive check-in call within the week.',
   mistakes:['No health tracking — churn always comes as a surprise','Health assessment based only on GMV — misses engagement and relationship signals'],
   scenario:'A brand\'s campaign participation rate dropped from 4/month to 1/month over 3 months. GMV is still steady. What does this signal? Answer: Early churn signal. They are maintaining GMV from organic efforts but pulling back investment. They may be evaluating alternatives. Immediate proactive outreach needed.',
   takeaway:'Track engagement signals, not just GMV. Declining participation precedes declining GMV by months. Health score monthly. Act on amber signals immediately.'},

  {id:'am4', title:'Upselling and Cross-Selling Within Accounts',
   intro:'The easiest sale is to someone who already trusts you. Most account managers leave significant revenue on the table.',
   concept:'Upselling is moving an existing client to a higher-value service. Cross-selling is introducing them to adjacent services. The best time to do either is immediately after demonstrating value on the current engagement.',
   rule:'Upsell/cross-sell sequence: (1) Demonstrate value first — earn the right to ask for more, (2) Identify the adjacent opportunity based on their stated business objectives, (3) Frame the expansion as a logical next step, not a new sell.',
   explanation:'In e-commerce agency context: a brand starts on Shopee listings management → cross-sell to TikTok Shop → then to livestream production → then to performance marketing. Each expansion is built on demonstrated success at the prior stage.',
   why:'Customer acquisition costs 5-7× more than expansion revenue. The gross margin on expanded accounts is typically higher because infrastructure costs are already absorbed.',
   hrbp:'Wardah\'s account expansion from Shopee to TikTok Shop to livestream to performance marketing is the archetype of systematic account expansion built on demonstrated results at each stage.',
   mistakes:['Cross-selling before demonstrating value in the current engagement','Upselling based on your revenue targets, not the client\'s actual needs'],
   scenario:'A brand is happy with your Shopee management. You want to introduce TikTok Shop. How do you frame it? Answer: "Wardah, a comparable brand in your category, expanded from Shopee-first to a TikTok Shop parallel strategy and saw a 40% GMV uplift. Given your Q4 targets, I\'d like to walk you through what this could look like for you."',
   takeaway:'Earn the right to expand before you ask to expand. Frame upsells as logical next steps toward the client\'s own stated goals.'},

  {id:'am5', title:'Managing Difficult Client Conversations',
   intro:'The ability to have a difficult conversation without losing the relationship is one of the highest-value skills in account management.',
   concept:'Difficult conversations include: performance misses, budget disagreements, scope creep disputes, and relationship deterioration. Avoiding them makes them worse.',
   rule:'Structure: (1) Acknowledge the situation, (2) Present facts data-based, (3) Own what is yours to own, (4) Present a clear resolution proposal, (5) Confirm the path forward and the relationship.',
   explanation:'The most common error is defensiveness when the client raises legitimate performance concerns. Defensiveness triggers the client\'s adversarial instinct. Acknowledgement followed by a credible plan triggers collaborative problem-solving.',
   why:'Clients who raise concerns and receive genuine engagement become stronger advocates than clients who never had a problem. The recovery is the relationship-builder.',
   hrbp:'When a campaign underperforms: never rationalise before you acknowledge. "I understand this result fell short of what we set together. Here is my analysis of what happened and what we are doing differently."',
   mistakes:['Leading with excuses before acknowledging the impact','Avoiding the conversation entirely — silence reads as indifference'],
   scenario:'Campaign GMV came in at 60% of the RM500k target. Brand partner calls angrily. Opening line? Answer: "I hear your frustration and it is entirely valid. We set a target together and we did not hit it. Let me walk you through exactly what happened and what I am going to change."',
   takeaway:'Acknowledge before you analyse. Own before you explain. Resolve before you move on. Difficult conversations handled well build trust.'},
],

'marketplace': [
  {id:'mp1', title:'The Marketplace Ecosystem — How Platforms Actually Work',
   intro:'To win on marketplace, you need to understand how the algorithm decides who wins — because it is not random.',
   concept:'Marketplace platforms (Shopee, TikTok Shop, Lazada) operate algorithmic ranking systems that determine search visibility, campaign eligibility, and promotional real estate.',
   rule:'Three factors drive algorithmic ranking: (1) Conversion rate (CVR) — the platform optimises for sales, (2) Review velocity — new positive reviews improve ranking, (3) Sales velocity — recent GMV signals relevance to the algorithm.',
   explanation:'The reinforcing loop: higher ranking → more traffic → more sales → better ranking. Breaking into this loop requires either paid traffic to generate initial velocity, or a promotional event to spike initial sales.',
   why:'On a platform with millions of SKUs, discoverability is not accidental. It is engineered through understanding and working with the algorithm.',
   hrbp:'Kiehl\'s No.1 premium brand ranking for 8 consecutive months was a sustained combination of SEO (keyword-optimised listings), Super Brand Day (sales velocity spike), and ads (conversion rate maintenance).',
   mistakes:['Launching on marketplace with no plan to break into the algorithm — listing and waiting','Ignoring CVR as the primary platform metric — many brands optimise traffic but not conversion'],
   scenario:'A new beauty brand launches on Shopee with a great product but zero reviews and poor ranking. First 90-day strategy? Answer: Month 1: Vouchers/flash deals to generate initial sales velocity and reviews. Month 2: Ads targeting high-converting search terms. Month 3: Apply for first campaign feature slot with proven CVR.',
   takeaway:'Marketplace equals algorithm game. CVR drives ranking. Reviews drive CVR. Ranking drives organic traffic. Engineer the loop deliberately, starting with conversion before buying traffic.',
      diagram:'<svg viewBox="0 0 320 130" xmlns="http://www.w3.org/2000/svg" font-family="Inter,sans-serif"><text x="160" y="16" text-anchor="middle" fill="#60cc7a" font-size="10" font-weight="700" letter-spacing="1">MARKETPLACE RANKING LOOP</text><circle cx="160" cy="32" r="18" fill="#3ea85a20" stroke="#3ea85a" stroke-width="1.2"/><text x="160" y="29" text-anchor="middle" fill="#3ea85a" font-size="7.5" font-weight="600">Higher</text><text x="160" y="40" text-anchor="middle" fill="#3ea85a" font-size="7.5" font-weight="600">Ranking</text><circle cx="225" cy="72" r="18" fill="#2a9d6a20" stroke="#2a9d6a" stroke-width="1.2"/><text x="225" y="69" text-anchor="middle" fill="#2a9d6a" font-size="7.5" font-weight="600">More</text><text x="225" y="80" text-anchor="middle" fill="#2a9d6a" font-size="7.5" font-weight="600">Traffic</text><circle cx="195" cy="112" r="18" fill="#28a86020" stroke="#28a860" stroke-width="1.2"/><text x="195" y="109" text-anchor="middle" fill="#28a860" font-size="7.5" font-weight="600">More</text><text x="195" y="120" text-anchor="middle" fill="#28a860" font-size="7.5" font-weight="600">Sales</text><circle cx="125" cy="112" r="18" fill="#4aaa4020" stroke="#4aaa40" stroke-width="1.2"/><text x="125" y="109" text-anchor="middle" fill="#4aaa40" font-size="7.5" font-weight="600">More</text><text x="125" y="120" text-anchor="middle" fill="#4aaa40" font-size="7.5" font-weight="600">Reviews</text><circle cx="95" cy="72" r="18" fill="#38b85820" stroke="#38b858" stroke-width="1.2"/><text x="95" y="69" text-anchor="middle" fill="#38b858" font-size="7.5" font-weight="600">Better</text><text x="95" y="80" text-anchor="middle" fill="#38b858" font-size="7.5" font-weight="600">CVR</text><text x="160" y="126" text-anchor="middle" fill="#748a76" font-size="8">CVR is the key input — fix conversion before buying more traffic</text></svg>'},

  {id:'mp2', title:'Shopee vs TikTok Shop vs Lazada — Platform Strategy',
   intro:'Each platform has a different algorithmic logic, user behaviour, and growth lever. A one-size-fits-all approach loses on all three.',
   concept:'Platform differentiation: Shopee = search-driven, high purchase intent, voucher-sensitive. TikTok Shop = discovery-driven, impulse purchase, content-first. Lazada = search-driven, strong cross-border, loyalty programme-heavy.',
   rule:'Match strategy to platform behaviour: Shopee → SEO, ads, campaign slots. TikTok Shop → short-form video, affiliate programme, livestream. Lazada → LazMall positioning, voucher strategy, bundle mechanics.',
   explanation:'The biggest marketplace BD error: treating Shopee strategy as the template for TikTok Shop. TikTok Shop requires entirely different content investment — the product catalogue that works on Shopee is invisible on TikTok without video content.',
   why:'Platform-specific strategy amplifies ROI. Platform-agnostic strategy dilutes it across all three.',
   hrbp:'Wardah\'s TikTok Super Brand Day generating RM500k and 3× ROI was only possible because the TikTok-specific strategy (live commerce, short-form video, affiliate activation) was executed correctly.',
   mistakes:['Same product images and copy across all platforms','Treating TikTok Shop as Shopee with videos — the algorithm and user behaviour are fundamentally different'],
   scenario:'Brand wants to launch on TikTok Shop having been successful on Shopee. What do you warn them about? Answer: Content investment is non-negotiable on TikTok. Products need native video content. The image that works on Shopee is not enough. Expect a 60-90 day content ramp-up before ads become efficient.',
   takeaway:'Platform does not equal channel. Each has its own algorithm, user behaviour, and growth mechanics. Build platform-specific strategies. Shopee-first does not mean TikTok-ready.'},

  {id:'mp3', title:'Super Brand Day — Planning and Executing at Scale',
   intro:'Super Brand Day is the highest-stakes campaign moment on Shopee and TikTok. The difference between 1× and 3× ROI is preparation depth.',
   concept:'Super Brand Day is a platform-featured promotional event where a brand gets dedicated homepage real estate, enhanced ad allocation, and platform-driven traffic for 24 hours. The window is short — preparation must be long.',
   rule:'SBD preparation timeline: T-60 days: confirm inventory, negotiate mechanic, brief content team. T-30 days: hero listings finalised, ads confirmed, affiliate briefed. T-14 days: teaser content live. T-7 days: final inventory check, live script confirmed.',
   explanation:'The RM500k Wardah TikTok SBD and Kiehl\'s RM1M Shopee SBD were outcomes of structured preparation — hero product identification, inventory pre-positioning, affiliate activation, and real-time monitoring during the event.',
   why:'SBD is a high-investment, high-visibility event. Poor execution damages both the brand relationship and future campaign eligibility.',
   hrbp:'During SBD, real-time monitoring is critical: hourly GMV tracking, stock depletion rate vs forecast, live conversion optimisation (adjusting pricing, mechanics, and live script in real-time based on data).',
   mistakes:['Inventory not aligned with campaign traffic — stockout in hour 3 of a 24-hour SBD','No pre-launch teaser — missing the week of warm-up traffic that SBDs generate before day zero'],
   scenario:'SBD starts in 2 hours. Key SKU has 200 units in warehouse but only 50 are live in seller centre due to upload error. What do you do? Answer: All-hands on seller centre listing fix immediately. Brief the live host on the inventory constraint. Every minute of non-availability during SBD has a direct GMV cost.',
   takeaway:'SBD outcome is 80% determined before the day starts. Inventory, content, affiliate, and platform alignment done in advance. On the day: monitor in real-time, adapt, and solve fast.'},

  {id:'mp4', title:'Category Ranking — Owning Your Space',
   intro:'Being the No.1 brand in your category is not a vanity metric — it is the flywheel that self-perpetuates growth.',
   concept:'Category ranking on marketplace determines which brands appear first in search results. The No.1 brand receives disproportionate organic traffic relative to lower-ranked competitors.',
   rule:'Ranking drivers: sales volume (approx. 40%), conversion rate (30%), review count and rating (20%), listing quality and SEO (10%). Approximate weights — actual algorithm is proprietary but these factors are consistently documented.',
   explanation:'Kiehl\'s maintained No.1 premium brand on Shopee for 8 months through: consistent SBD-driven sales velocity spikes, SEO-optimised listings for category keywords, and an affiliate programme that drove review volume.',
   why:'Organic traffic from category leadership is the lowest-cost customer acquisition channel in marketplace. A ranking investment pays dividends in perpetuity.',
   hrbp:'Category rankings are visible to competitors. Monitoring your rank weekly and understanding what moved it is essential competitive intelligence.',
   mistakes:['Organic ranking as an afterthought — all investment in paid ads, none in ranking fundamentals','Ranking maintenance treated as achieved — it requires active monthly investment to sustain'],
   scenario:'Brand has been No.1 for 3 months. They want to cut listing optimisation budget. Advice? Answer: Advise against it. Ranking is a share — it only exists in relation to what competitors do. The moment you stop investing, a competitor who is actively investing will close the gap. The cost of reacquisition exceeds the cost of maintenance.',
   takeaway:'Category No.1 is a compound asset. Invest in maintaining it. Never treat ranking as done.'},

  {id:'mp5', title:'Seller Centre Management — The Operational Foundation',
   intro:'A brilliant strategy with a poorly managed seller centre is a brilliant strategy that does not execute.',
   concept:'Seller Centre is the operational backbone of marketplace presence — managing listings, inventory, orders, ads, and seller performance metrics. Excellence here separates good from great marketplace managers.',
   rule:'Non-negotiable standards: (1) Listings fully optimised (title, images, description, keywords, pricing), (2) Inventory maintained above safety stock, (3) Order fulfilment SLA > 95% on-time, (4) Seller rating maintained (response rate > 90%).',
   explanation:'Seller performance metrics feed directly into algorithmic ranking. A brand with a 97% fulfilment rate ranks better than the same brand at 88%, holding all other factors constant.',
   why:'Your seller health score is your licence to operate in high-traffic promotions. Let it slip and you lose campaign eligibility.',
   hrbp:'Managing 8 seller centres simultaneously at Momentum Commerce required systematic SOP-driven operations — each centre with a designated PIC, daily checklist, and escalation protocol.',
   mistakes:['Stockouts during peak campaigns — the most expensive operational failure in marketplace','Poor seller ratings from slow response to buyer messages — damages listing visibility'],
   scenario:'Brand is about to enter 11.11 campaign. They have 500 units in stock for a RM1M target. What is the risk? Answer: Critical stockout risk. At average order value of RM80, 500 units = RM40k ceiling. Either increase stock order immediately or reduce campaign ambition.',
   takeaway:'Strategy without operational execution fails. Seller health equals ranking eligibility. Stockouts during campaigns are the most avoidable and most costly marketplace failures.'},
],

'campaigns': [
  {id:'ca1', title:'The Campaign Calendar — Strategic vs Reactive',
   intro:'Brands that plan their campaign calendar 3 months in advance outperform brands that respond to platform invitations as they arrive.',
   concept:'A campaign calendar is the 12-month plan of promotional events, peak seasons, and brand moments — mapped against platform campaign slots, seasonal demand curves, and commercial targets.',
   rule:'Campaign planning hierarchy: (1) Platform mega-campaigns (Double Digits: 9.9, 10.10, 11.11, 12.12 — plan 90 days ahead), (2) SBD and Pay Day Sales — plan 60 days ahead, (3) Brand-owned moments — plan 45 days ahead, (4) Tactical fills — plan 14 days ahead.',
   explanation:'The brands that consistently outperform on Double Digit campaigns are the ones with inventory pre-positioned, content pre-produced, and ads pre-loaded 30+ days before the event.',
   why:'Campaign preparation time compounds — 90 days of prep produces 3× the result of 30 days of prep, because every downstream element takes time to execute well.',
   hrbp:'At Shopee and Momentum Commerce, biweekly stakeholder planning sessions for campaigns were the structural mechanism that prevented reactive execution.',
   mistakes:['Confirming participation in 11.11 at T-14 days — too late for inventory, content, and affiliate alignment','No linkage between campaign calendar and inventory planning'],
   scenario:'It is September 1. Your brand has not started planning for 11.11. First action? Answer: Immediate campaign brief to all stakeholders: inventory team, content team, platform rep, and ads team. You are behind — move fast on all fronts simultaneously.',
   takeaway:'Plan 90-60-45-14 days out. The earlier you plan, the better every element executes. Reactive campaign management is the most expensive way to deliver mediocre results.'},

  {id:'ca2', title:'GMV Forecasting — Building Credible Targets',
   intro:'A GMV target without a bottoms-up model is a wish. A target with a model is a commitment.',
   concept:'GMV forecasting is the process of building a bottom-up projection of campaign revenue based on: traffic estimates, conversion rate assumptions, average order value, and campaign mechanic uplifts.',
   rule:'GMV forecast components: Baseline GMV (average of last 3 months) × Campaign traffic multiplier × Conversion uplift (do mechanics improve CVR?) × AOV adjustment (do bundle mechanics change basket size?).',
   explanation:'Most campaign GMV misses are not due to poor execution on the day — they are due to unrealistic targets set without a model. A target built on interrogatable assumptions is defensible.',
   why:'Credible forecasting builds trust with brand partners, enables better inventory planning, and gives the team a fair performance benchmark.',
   hrbp:'When doubling Wardah\'s November GMV from RM700k to RM1.4M was the target, the forecast model would show: what traffic uplift is expected, what conversion mechanics drive it, and what inventory depth is needed.',
   mistakes:['Top-down targets set without bottoms-up validation','No post-campaign reconciliation — targets missed without analysis means the same mistakes repeat'],
   scenario:'Brand partner asks for a RM2M GMV target for 11.11. Your model projects RM1.4M. How do you handle the conversation? Answer: Present your model transparently. "To reach RM2M, we would need X more ad spend, Y more inventory, and Z improved mechanics. Here is what each lever costs and its expected return."',
   takeaway:'Forecast bottoms-up, not top-down. Show your assumptions. Make targets stretchable through investment, not wishful thinking. Post-campaign reconciliation is where the learning lives.'},

  {id:'ca3', title:'Double Digit Campaigns — Winning the Peak',
   intro:'11.11, 12.12, 9.9 — these are the moments that define annual marketplace performance. The winners are determined by preparation, not by execution on the day.',
   concept:'Double Digit campaigns are the highest-traffic events on SEA marketplaces. Traffic multipliers of 10-30× normal day are typical. Preparation depth is the primary success factor.',
   rule:'Double Digit success factors: Hero SKU identification (2-3 products driving 70% of GMV), Mechanic depth (bundles, vouchers, flash deals), Inventory pre-positioning (3 weeks before campaign), Ads pre-loading (2 weeks before event).',
   explanation:'The Shopee Shocking Sale is a precursor campaign that allows brands to generate review velocity and algorithm momentum before the main event. Winning brands use it as a warmup, not as the main event.',
   why:'Double Digit campaigns generate 20-40% of annual marketplace GMV in a 24-48 hour window. The ROI differential between prepared and unprepared brands is enormous.',
   hrbp:'At Shopee, leading the Shocking Sale initiative for Health & Beauty and achieving 10% MoM allocation increase demonstrates that pre-campaign platform engagement drives allocation and feature slot eligibility for the main event.',
   mistakes:['Participating in Double Digits with standard pricing — mechanics need to be event-specific to compete for the consumer\'s wallet','Insufficient inventory — the most common single-point failure in Double Digit campaigns'],
   scenario:'It is 10.10 launch day. Your hero SKU sells out in the first 2 hours. 22 hours of the campaign run on depleted stock. How do you prevent this next time? Answer: Hero SKU inventory should be 2× your bottoms-up GMV projection. Over-index on stock for the top 3 SKUs. The downside of excess stock is modest; the downside of stockout is catastrophic.',
   takeaway:'Double Digits: hero SKU, aggressive mechanics, 2× inventory, 30-day prep. The day itself is too late to fix anything. Every result on the day was determined weeks before.'},

  {id:'ca4', title:'Campaign ROI — Measuring What Actually Matters',
   intro:'GMV is a vanity metric without margin. Campaign ROI is the number that determines whether the business grew or just processed volume.',
   concept:'Campaign ROI measures the return on total campaign investment — including platform fees, ad spend, voucher subsidy, and operational costs — against the incremental margin generated.',
   rule:'Campaign ROI formula: (Campaign GMV × margin rate − campaign costs) ÷ campaign costs. A 3× ROI means for every RM1 invested, RM3 in net return was generated.',
   explanation:'The GMV trap: a brand can achieve RM1M GMV with negative ROI if the mechanic cost (deep discounts plus voucher subsidy plus ads) exceeds the margin generated. This is growth that destroys value.',
   why:'Brands increasingly measure campaigns on ROI, not just GMV. BD managers who speak the language of margin and ROI are trusted with bigger budgets.',
   hrbp:'Wardah TikTok SBD achieving 3× ROI across two consecutive years means the financial model was robust — not just the GMV outcome. Being able to present this to brand partners is a significant BD asset.',
   mistakes:['Presenting GMV growth without margin context — the client\'s finance team will find the real number eventually','ROI calculation that excludes voucher subsidy — understates the true cost of the campaign mechanic'],
   scenario:'Campaign generated RM800k GMV (target: RM700k) but ROI was 1.2× (target: 2.5×). How do you present this? Answer: GMV exceeded target but ROI undershot significantly. Analyse why: too deep a discount mechanic? Over-spend on ads? Propose mechanic adjustments for next campaign to protect margin while maintaining volume.',
   takeaway:'GMV tells you how much moved. ROI tells you whether the business made money doing it. Always track both. A brand partner who trusts your ROI analysis will give you more budget autonomy.'},
],

'performance-mktg': [
  {id:'pm1', title:'Paid Ads on Marketplace — The Foundation',
   intro:'Marketplace ads are not optional for brands that want to scale. They are the traffic engine that fuels organic ranking.',
   concept:'Marketplace paid advertising (Shopee Ads, TikTok Shop Ads) operates on a CPC or CPM model. The objective is not just traffic — it is profitable traffic that converts.',
   rule:'Key marketplace ad types: Search Ads (capture high-intent search traffic — highest conversion, highest CPC), Discovery Ads (browsing feeds — lower CVR but builds awareness), Product Boost (Shopee-specific; boosts search rank for specific keywords).',
   explanation:'ROAS (Return on Ad Spend) is the primary paid ads metric: Revenue from ads ÷ Ad spend. A ROAS of 8× means for every RM1 spent on ads, RM8 in GMV was generated. Acceptable ROAS varies by category margin — a high-margin skincare brand can accept 5×, while a low-margin FMCG brand needs 15×.',
   why:'Paid ads create the initial sales velocity that improves organic ranking — which then reduces the need for paid ads. The investment in ads is an investment in organic ranking.',
   hrbp:'Managing paid ads at Shopee with CPAS, Google Ads, and TikTok Ads experience: the cross-platform ads strategy is increasingly important as attribution becomes multi-touch — understanding how each channel contributes to the final conversion.',
   mistakes:['Running broad match keywords on all ad types — burning budget on low-intent terms','Setting a budget and leaving it — ads require daily monitoring and optimisation, especially during campaigns'],
   scenario:'Brand has RM10,000 monthly ads budget. Competitive skincare category. How do you allocate? Answer: 60% Search Ads (high-intent, direct conversion), 25% Product Boost on hero SKUs (ranking maintenance), 15% Discovery Ads (awareness, remarketing). Review weekly. Shift budget toward what is performing.',
   takeaway:'ROAS is the north star. Match ROAS targets to category margin. Start with Search (highest intent). Allocate Product Boost for ranking maintenance. Review weekly — set it and forget it destroys budget.'},

  {id:'pm2', title:'Marketplace SEO — The Free Traffic Compounding Asset',
   intro:'Marketplace SEO is different from Google SEO, but the principle is the same: optimise for how users actually search, and the algorithm rewards you with free visibility.',
   concept:'Marketplace SEO is the practice of optimising product listings to rank higher in platform search results for relevant keywords.',
   rule:'Marketplace SEO formula: (1) Keyword research — what are buyers actually typing? (2) Title optimisation — primary keyword in first 30 characters, (3) Description — answer buyer questions and embed keywords naturally, (4) Attributes — fill all platform attribute fields completely, (5) Correct category placement.',
   explanation:'A product titled "Kiehl\'s Serum" will rank lower than "Kiehl\'s Midnight Recovery Concentrate Face Serum Anti-Aging 50ml" for the search "face serum anti-aging" — even if the product is identical.',
   why:'Every optimised listing generates ongoing free traffic. The investment compounds: a well-optimised listing from 18 months ago continues generating traffic today.',
   hrbp:'Creating and updating optimised product listings across 8 seller centres — this is the operational execution of marketplace SEO at scale. A consistent SEO standard across all listings is a significant competitive advantage.',
   mistakes:['Manufacturer product names as listing titles — optimised for internal codes, not buyer search queries','Zero keyword research — using assumed search terms instead of actual platform data'],
   scenario:'New skincare product launches on Shopee. No SEO work done. Traffic is zero after 2 weeks. First action? Answer: Download the Shopee keyword planner data for category. Identify top 10 search terms with volume. Rewrite listing titles and descriptions incorporating these terms. The product is invisible because the algorithm cannot classify it.',
   takeaway:'Marketplace SEO: keyword research → title optimisation → description → attributes → correct category. Each optimised listing is a perpetual traffic asset. Do it right once, maintain it regularly.'},

  {id:'pm3', title:'Affiliate Marketing on Marketplace',
   intro:'Affiliates are your distributed sales force — people who bring their own audience to sell your product for a commission. Done well, they are one of the highest-ROI channels in e-commerce.',
   concept:'Marketplace affiliate programmes (Shopee Affiliate, TikTok Creator Marketplace) allow brands to recruit content creators and publishers to promote their products in exchange for a commission on resulting sales.',
   rule:'Affiliate programme fundamentals: commission rate (typically 5-15% depending on category), product provision for content creation, tracking links, and performance monitoring. Quality of affiliate partners matters more than quantity.',
   explanation:'The TikTok affiliate model is powerful because: content is native (feels organic, not like an ad), tracking is precise (every sale from the creator\'s link is attributed), and cost is performance-based.',
   why:'Affiliates provide: incremental traffic from audiences you cannot reach through your own channels, social proof from trusted creators, review generation as a byproduct, and a performance-based cost structure.',
   hrbp:'Shopee affiliate initiatives for Kiehl\'s ranking maintenance — affiliates drive not just direct sales but also review velocity and algorithm signals that compound into better organic ranking.',
   mistakes:['Blanket affiliate recruitment — 500 affiliates with poor content produces worse results than 20 affiliates with high engagement audiences','Commission rates below market — affiliates deprioritise low-commission brands in favour of better-paying alternatives'],
   scenario:'Brand wants to launch TikTok Shop affiliate campaign in 30 days. Budget is RM5,000. How do you deploy it? Answer: RM3,000 on product provision (12-15 micro-creators at RM200 product each), RM1,500 on creator performance top-ups for best performers mid-campaign, RM500 on management tools. Prioritise 20k-100k follower creators (higher engagement rate than mega-influencers).',
   takeaway:'Affiliates = distributed, performance-based sales force. Quality over quantity. Commission must be competitive. Track performance at creator level and redeploy budget toward winners.'},

  {id:'pm4', title:'CPAS and Cross-Platform Ads',
   intro:'Brands that are present only on-platform for their ads are leaving a significant share of the funnel unaddressed.',
   concept:'Cross-platform advertising extends e-commerce brand presence beyond the marketplace itself — using Google Shopping, Facebook CPAS (Collaborative Ads), and TikTok Ads to drive traffic into marketplace listings from off-platform discovery.',
   rule:'CPAS (Collaborative Ads): Facebook and Instagram ads where the product catalogue is synced from Shopee — clicks go directly to the Shopee listing, and attribution is tracked at the order level. Most effective for remarketing to listing visitors who did not purchase.',
   explanation:'The customer journey increasingly spans platforms: awareness on Instagram → research on Google → purchase on Shopee. Brands that only advertise on Shopee miss the awareness and consideration phases.',
   why:'Off-platform traffic diversifies the acquisition mix and reduces dependency on marketplace algorithm changes. It also drives incremental reach beyond platform-native audiences.',
   hrbp:'CPAS experience at Shopee: collaborative ads where brand provides the creative and Shopee provides the product feed — this combines brand creative quality with Shopee\'s purchase-intent audience data.',
   mistakes:['Off-platform ads directed to a brand website instead of marketplace listings — losing the conversion convenience of marketplace checkout','No attribution model to understand which platforms are genuinely contributing to sales vs which are claiming credit'],
   scenario:'Brand is spending RM20k/month on Shopee ads and wants to grow faster. How do you advise on CPAS integration? Answer: Add RM3-5k CPAS to start. Target: remarketing to Shopee listing visitors who did not convert. Expected ROAS for remarketing: 4-8×. This is the lowest-risk cross-platform expansion because you are targeting warm audiences.',
   takeaway:'CPAS for remarketing is the lowest-risk cross-platform entry. Google Shopping for new audience discovery. TikTok for brand building and creator commerce. Each platform addresses a different funnel stage.'},
],

'livestream': [
  {id:'ls1', title:'Livestream Commerce — The New Storefront',
   intro:'Livestream is not just a sales channel — it is a real-time shopping experience that combines entertainment, product demonstration, and frictionless purchase.',
   concept:'Livestream commerce on TikTok Shop and Shopee Live allows brands to sell products in real-time through video format — with hosts demonstrating products, interacting with viewers, and driving immediate purchases through limited-time offers.',
   rule:'Livestream success factors: (1) Host quality (authentic, knowledgeable, engaging), (2) Product selection (hero SKUs with demonstrable value propositions), (3) Mechanic urgency (limited quantities, time-limited prices), (4) Traffic (pre-stream promotion and ads during stream), (5) Technical quality (lighting, sound, stable connection).',
   explanation:'Conversion mechanics in livestream are fundamentally different from static listing purchase — it is impulse-driven, peer-influenced, and urgency-based. The host is the product. Production quality is the trust signal.',
   why:'Livestream has higher conversion rates than static listings for products that benefit from demonstration (skincare, fashion, food) because it answers objections in real-time and creates social proof through viewer count and purchase notifications.',
   hrbp:'Managing end-to-end livestream operations across 8 seller centres at Momentum Commerce — this means standardising the operational playbook across brands, hosts, and categories rather than reinventing it for each stream.',
   mistakes:['Livestream without pre-stream traffic promotion — going live into an empty room','Host without product knowledge — viewer questions answered incorrectly destroy trust and suppress purchases'],
   scenario:'First TikTok live session for a beauty brand. RM5,000 budget. How do you plan it? Answer: RM2,000 on pre-stream TikTok ad boost to drive viewers to the live, RM1,500 on host product training and mock session, RM1,500 on giveaway budget for engagement mechanics during stream. Target: 300+ peak concurrent viewers, 15%+ conversion rate on featured products.',
   takeaway:'Livestream = entertainment plus product plus urgency. Host is the brand ambassador. Traffic before the stream determines peak concurrent viewers. Mechanics during the stream determine conversion. Train the host before you go live.'},

  {id:'ls2', title:'TikTok Live Strategy — Content-Commerce Integration',
   intro:'TikTok Live converts best when the commerce feels like content — not when the content feels like an ad.',
   concept:'TikTok Live commerce strategy requires integrating entertainment content with product selling such that viewers stay engaged even when they are not in immediate purchase mode.',
   rule:'TikTok Live content framework: (1) Hook — first 60 seconds: why should viewers stay? (2) Value delivery: product education, story, entertainment, (3) Offer reveal: mechanism with genuine urgency, (4) Social proof: testimonials, live purchase notifications, (5) Close: clear CTA and PIN the product.',
   explanation:'TikTok\'s algorithm rewards livestream sessions with high watch time and engagement with additional organic reach. Sessions with 30% watch time and 200 comments get pushed to more viewers regardless of purchase conversion.',
   why:'TikTok is a discovery platform. The consumer who discovers a product through an entertaining live session is a converted brand advocate, not just a transacting customer.',
   hrbp:'Wardah TikTok Super Brand Day 2024 and 2025 both generating RM500k+: the consistency suggests a repeatable playbook — the SBD framework was systematised and improved between years, not re-invented from scratch.',
   mistakes:['Live session that is purely a product listing read — no entertainment value, no retention','Going live only during SBD — TikTok algorithm requires consistent streaming cadence to build channel authority'],
   scenario:'Brand\'s TikTok live conversion rate is 4% (industry average 8-12%). Most likely causes? Answer: (1) Host not trained in live selling techniques, (2) Products not demonstrable in video format, (3) No urgency mechanic — viewers watching without a reason to buy now, (4) Pre-stream traffic not generating warm audiences. Diagnose each before prescribing.',
   takeaway:'TikTok Live = entertainment first, commerce second. Hook in 60 seconds. Deliver value before you sell. Create genuine urgency. Train the host. Stream consistently, not just for SBD.'},

  {id:'ls3', title:'Livestream Operations at Scale',
   intro:'Running one livestream is a creative effort. Running eight simultaneously across different seller centres is an operational system.',
   concept:'Scaling livestream operations requires: standardised playbooks, trained host pools, operational checklists, real-time monitoring protocols, and post-session analytics review.',
   rule:'Multi-centre livestream SOP: Pre-session (T-2hrs): inventory check, product pin setup, host briefing, tech test. During session: GMV tracking by PIC, comment moderation, real-time mechanic triggers. Post-session (T+1hr): debrief, conversion data analysis, inventory reconciliation.',
   explanation:'The bottleneck in scaling livestream is host quality and consistency — not technical infrastructure. A systematic host development programme is the core operational investment.',
   why:'Brands with consistent, high-quality livestream operations compound their TikTok channel authority over time — the algorithm rewards regular, high-engagement sessions with growing organic reach.',
   hrbp:'Leading cross-functional teams across 8 seller centres — maintaining quality consistency when the operation is distributed requires standardised scripts, product pins, and post-session debriefs as the quality control mechanisms.',
   mistakes:['Each seller centre operating with its own informal process — quality variance is high and unpredictable','No post-session debrief — the same conversion mistakes repeat across sessions'],
   scenario:'You manage 8 TikTok channels for different brands. How do you maintain quality without being present on every stream? Answer: (1) Standardised pre-session checklist completed by PIC for each channel, (2) Remote monitoring dashboard showing concurrent viewers and GMV for all 8 streams simultaneously, (3) Weekly host performance scorecard, (4) Best practice clips library — sessions that worked are documented and shared.',
   takeaway:'Scale livestream through systems, not supervision. Standardise the playbook. Train hosts consistently. Review data post-session. Quality at scale requires process, not heroics.'},
],

'data-analytics': [
  {id:'da1', title:'GMV Dashboards — Building Visibility That Drives Decisions',
   intro:'A dashboard that describes the past is a report. A dashboard that enables decisions about the future is a tool.',
   concept:'GMV dashboards track: daily/weekly/monthly GMV vs target, GMV by channel and platform, conversion rate, average order value (AOV), traffic sources, and campaign attribution.',
   rule:'Dashboard design principles: (1) Lead with the metric that matters most, (2) Show trends not just snapshots, (3) Make the exception visible (what is underperforming), (4) Enable drill-down from brand-level to SKU-level in two clicks.',
   explanation:'Automated real-time dashboards using AI tools reduced reporting time and improved decision-making velocity — the business decision that was previously made weekly (reporting took a day to compile) can now be made daily.',
   why:'In e-commerce, conditions change fast. A listing goes out of stock, a competitor runs a flash deal, a campaign underperforms. Real-time visibility allows real-time response.',
   hrbp:'Automating real-time sales and performance dashboards using AI tools at Momentum Commerce contributed to 2× GMV growth rate over six months. Faster data leads to faster decisions leads to faster course correction leads to better outcomes.',
   mistakes:['Dashboards built for reporting, not for action — no clear "what should I do" signal','Manual reporting processes that are weekly instead of real-time — decisions lag conditions by 5 days'],
   scenario:'It is day 3 of a 7-day campaign. Dashboard shows CVR dropping from 6% to 3.8% while traffic is stable. What action does this trigger? Answer: Listing quality or pricing issue. Check: (1) Was pricing changed? (2) Did a competitor drop price? (3) Are hero SKUs in stock? (4) Did platform change the campaign landing page? Diagnose and fix same day.',
   takeaway:'Dashboard = decision engine. Real-time beats weekly. Exception alerting beats status-reporting. Build dashboards around decisions, not metrics.'},

  {id:'da2', title:'KPI Framework — Measuring What Moves the Business',
   intro:'Tracking 20 KPIs is the same as tracking none — you see everything and act on nothing.',
   concept:'A KPI framework identifies the 5-7 metrics that most directly drive business performance, and establishes targets, tracking frequency, and ownership for each.',
   rule:'BD KPI stack in order of hierarchy: (1) GMV — is the strategy working? (2) Conversion Rate — does the listing convert traffic? (3) ROAS — is ad spend generating return? (4) Category rank — competitive position, (5) Seller health score — platform eligibility, (6) Account NPS — relationship quality.',
   explanation:'The leading indicators (CVR, seller health, account satisfaction) predict future GMV. The lagging indicators (GMV, ROAS) confirm past performance. Strong BD managers pay as much attention to leading indicators as lagging ones.',
   why:'Without a KPI framework, discussions about performance are opinion-based. With one, they are data-based — which leads to faster diagnosis and better decisions.',
   hrbp:'Biweekly presentations to upper management at Momentum Commerce are only impactful if the KPI framework is clearly defined and consistently tracked, so each session presents movement on the same metrics.',
   mistakes:['GMV as the only KPI — tells you what happened, not why, and not what to do','Changing KPIs every quarter — you cannot track progress against a moving target'],
   scenario:'Brand GMV is flat month-over-month despite increasing ad spend by 30%. Which KPIs do you investigate? Answer: (1) ROAS — the additional ad spend may not be generating incremental GMV, (2) CVR — more traffic arriving but not converting suggests a listing or pricing issue, (3) Category rank — competitors may be outranking despite your higher spend.',
   takeaway:'5-7 KPIs. Leading plus lagging indicators. Consistent tracking. GMV alone is insufficient. Build the framework once, track it every week, and make it the language of every performance conversation.'},

  {id:'da3', title:'Using AI Tools in E-Commerce Analytics',
   intro:'AI does not replace commercial judgment. It removes the manual work that was preventing you from exercising commercial judgment fast enough.',
   concept:'AI-assisted analytics automates: data aggregation from multiple platforms, performance anomaly detection, campaign reporting, and trend analysis — freeing the account manager for interpretation and action.',
   rule:'High-value AI applications in e-commerce BD: (1) Automated KPI dashboards from seller centre APIs, (2) Natural language queries on performance data, (3) Predictive inventory alerts, (4) Competitor price monitoring.',
   explanation:'Automating real-time sales dashboards at Momentum Commerce using AI tools contributed to 2× GMV growth rate — because response time to performance signals dropped from days to hours, and analysis time dropped from hours to minutes.',
   why:'E-commerce generates enormous amounts of data. Human analysis of all available data is impossible. AI-assisted analytics makes the signal visible in the noise.',
   hrbp:'Practical AI tool stack for e-commerce analytics: Google Sheets with Apps Script for automation, Looker Studio or Power BI for visualisation, seller centre API integrations, and AI prompt-based analysis for interpreting trend data.',
   mistakes:['Automating the wrong things — spending 3 days automating a report that takes 30 minutes manually','No interpretation layer — data dashboards without a narrative about what the data means are just faster reports'],
   scenario:'You have 8 seller centres with different GMV tracking systems. How do you build a unified analytics view? Answer: (1) Identify common data layer (GMV, CVR, ROAS, stock level), (2) Pull via API into a central Looker Studio, (3) Standardise SKU naming for cross-centre comparison, (4) Set up automated daily email with exceptions (accounts underperforming vs target by more than 15%).',
   takeaway:'Automate the collection. Apply judgment to the interpretation. Build exception alerts, not status reports. AI removes the manual work — you provide the commercial intelligence.'},
],

'pitching': [
  {id:'pi1', title:'New Business Acquisition — The Hunt',
   intro:'The best BD managers are systematic hunters — not waiting for warm inbound, but actively building a pipeline of qualified targets.',
   concept:'New business acquisition involves: prospecting (identifying brands with online potential), qualifying (do they have budget, willingness, and strategic fit?), outreach, discovery, proposal, and close.',
   rule:'Qualification framework (BANT): Budget (can they invest in platform and ads?), Authority (are you speaking to the decision-maker?), Need (do they have an e-commerce gap worth addressing?), Timing (is this the right point in their business cycle?).',
   explanation:'At Shopee: acquiring and scaling 6 local brands into Shopee Mall, generating RM2.4M portfolio value within the first year — this was systematic acquisition. Each brand was qualified against clear criteria before significant time was invested.',
   why:'Unqualified prospects consume as much time as qualified ones during pitching but convert at a fraction of the rate. Qualification is an efficiency multiplier.',
   hrbp:'The Super Seller Campaign on 6.6 that achieved 4× GMV vs RM50k target was built on a qualified portfolio of sellers — not a broad, unselected base. Quality of the acquisition cohort determined the campaign outcome.',
   mistakes:['No qualification process — presenting to anyone who will listen','Not identifying the real decision-maker — pitching to the brand manager when budget decisions are made by the marketing director'],
   scenario:'You are prospecting a local skincare brand with strong social media but no Shopee Mall presence. How do you open the conversation? Answer: Lead with market data they do not have. "Skincare search volume on Shopee in your category grew 34% last quarter. Your competitors X and Y are generating RM500k/month in this channel. I\'d love to show you what this opportunity looks like for your specific brand."',
   takeaway:'Qualify before you pitch. BANT: Budget, Authority, Need, Timing. Lead with market insights, not platform features. Arrive with data about their opportunity, not your product catalogue.'},

  {id:'pi2', title:'The Pitch Deck — Structuring a Winning Proposal',
   intro:'A great pitch deck tells a story — from where the client is now, to where they could be, to exactly how you will get them there.',
   concept:'Winning pitch deck structure: (1) Market opportunity, (2) Brand assessment (where they are vs benchmark), (3) The opportunity gap, (4) Your solution, (5) Proof points (comparable case studies with results), (6) Commercial proposal.',
   explanation:'The most common pitch deck failure: the solution section is 80% of the deck. The client does not care about your solution unless they first believe the opportunity is real and that you are credible enough to capture it.',
   why:'The pitch deck is a trust-building document. Each section builds a different dimension of trust: market expertise, commercial acumen, strategic capability, and proven track record.',
