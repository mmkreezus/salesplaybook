   hrbp:'Pitching for creative accounts at BBDO — winning the Pepsi Black, XPAX, Perodua, and Sime Darby pitches required exactly this structure: establish the opportunity, prove the understanding, demonstrate the capability, close with the ask.',
   mistakes:['Opening with "we are the leading e-commerce agency in Malaysia" — client\'s response is "everyone says that"','No case studies — any pitch without proof points is promises, not evidence'],
   scenario:'You have 20 minutes to pitch a luxury international brand on TikTok Shop. How do you structure the time? Answer: 3 mins: TikTok\'s luxury segment data. 4 mins: where their category is on TikTok today. 3 mins: the GMV gap. 7 mins: your specific strategy and comparable brand results. 3 mins: commercial proposal and Q&A.',
   takeaway:'Pitch structure: opportunity → assessment → gap → solution → proof → proposal. Build trust in that sequence. Your solution is only credible after the opportunity is established.'},

  {id:'pi3', title:'Handling Objections — Turning No Into Not Yet',
   intro:'Objections are not rejections. They are requests for more information, for reassurance, or for a different framing.',
   concept:'Objection handling is the practice of receiving client concerns without defensiveness, validating the concern, and addressing it with evidence or reframing.',
   rule:'The objection handling formula: (1) Acknowledge, (2) Clarify — make sure you understand the real objection (often the stated objection is not the actual one), (3) Address with evidence not assertion, (4) Confirm the concern is resolved before moving on.',
   explanation:'Common e-commerce BD objections decoded: "Your commission is too high" means "I am not yet convinced of the ROI." "We already have an agency" means "I do not see sufficient differentiation to justify switching." "We need to think about it" means "There is an unanswered concern I have not shared with you."',
   why:'Every unhandled objection is a reason to say no. Handled objections become the reasons the client justifies saying yes.',
   hrbp:'Writing and presenting pitch decks to win grants from MyCreative Ventures — grant pitches involve rigorous objection handling because the adjudicating panel is specifically looking for weaknesses. The same discipline applies in commercial pitching.',
   mistakes:['Treating "I need to think about it" as a decision — it almost never is','Answering the stated objection without probing for the real one — fixes the symptom, not the cause'],
   scenario:'"Your pricing is higher than the other agency we spoke to." How do you respond? Answer: "I understand, and pricing is an important consideration. Can I ask — when you compare the two proposals, what outcome differences are you expecting to see? I would like to make sure the comparison is on the same basis." Redirect to value, not price.',
   takeaway:'Acknowledge, then clarify the real objection, then address with evidence, then confirm resolution. Never argue with an objection. The client who raises objections and receives genuine answers becomes a buyer.'},
],

'negotiation': [
  {id:'neg1', title:'Commercial Negotiation — Principles, Not Tactics',
   intro:'Negotiation based on tactics produces one-time wins. Negotiation based on principles produces long-term relationships.',
   concept:'Commercial negotiation in e-commerce BD covers: commission rates, campaign investment levels, exclusivity terms, SLA commitments, and contract renewal terms.',
   rule:'Principled negotiation: (1) Separate the people from the issue, (2) Focus on interests not positions, (3) Create options before deciding, (4) Insist on objective criteria (market rate, benchmarks, data).',
   explanation:'Position-based negotiation ("we want 10%, you want 5%, we meet at 7.5%") leaves both parties feeling they lost. Interest-based negotiation creates value instead of just splitting it.',
   why:'The best commercial arrangements are ones both parties are motivated to execute. A client who feels squeezed in negotiation is not fully committed to the relationship.',
   hrbp:'Leading contract negotiations and renewals at Shopee — the most successful renewals were the ones where the new terms reflected the brand\'s growth in the relationship, not just Shopee\'s commercial objectives.',
   mistakes:['Making the first concession too quickly — signals that initial position was not genuine','No BATNA (Best Alternative to Negotiated Agreement) defined before entering negotiation — you cannot negotiate from strength without knowing your walk-away point'],
   scenario:'Brand partner wants to renew but requests a 30% commission reduction. Your business case supports 15%. How do you approach? Answer: "I can support a 15% adjustment based on the volume growth you\'ve delivered. To get to your 30% target, I would need to see the volume commitment that makes that margin structure viable — can we talk about what that looks like in the next 12 months?"',
   takeaway:'Principled negotiation: interests over positions, options before decisions, objective criteria. Know your BATNA before you sit down. Never make the first concession under time pressure.'},

  {id:'neg2', title:'Renewals — The Most Underrated Commercial Moment',
   intro:'Most account managers treat renewals as administrative. The best treat them as the most important BD conversation of the year.',
   concept:'Contract renewals are the highest-leverage commercial moment with an existing account — the point at which the relationship, commercial terms, and strategic alignment are all renegotiated simultaneously.',
   rule:'Renewal strategy: (1) Start 90 days before expiry, (2) Conduct a value review (document what you delivered vs what was committed), (3) Prepare the forward proposal with new commercial terms AND new strategic commitments, (4) Never let a renewal happen passively.',
   explanation:'Brands that renew passively — without reviewing what was delivered — are renewing out of inertia. A competitor who approaches at renewal time with a compelling proposal will win because the inertia-renewal brand had no renewal defence.',
   why:'Renewals are the lowest-cost revenue. An existing client renewing at current or higher terms requires a fraction of the effort of acquiring a new client at the same value.',
   hrbp:'Building renewal conversations 90 days in advance was a practice at Shopee for key FMCG Health & Beauty accounts — this allows time to course-correct and build a compelling forward proposal.',
   mistakes:['Renewal conversations starting at T-14 days — too late to address competing proposals or rebuild any relationship deficit','Renewal proposal that is identical to the original contract — fails to reflect what was learned and what has changed'],
   scenario:'Major account renewal is in 30 days. You just discovered they received a competitor proposal last week. Immediate actions? Answer: (1) Request an urgent meeting, do not wait for the scheduled renewal conversation. (2) Present your value delivery data for the past period. (3) Ask directly what the competitor offered and what matters most to the client for the next period. (4) Build a counter-proposal addressing their stated priorities.',
   takeaway:'Renewals: start 90 days out, review value delivered, build forward proposal, meet proactively. A passive renewal is a vulnerable renewal. The best renewal defence is a client who feels so well-served they do not want alternatives.'},
],

'stakeholders': [
  {id:'sh1', title:'Stakeholder Mapping — Knowing Who Matters and Why',
   intro:'Every commercial decision involves multiple people. Knowing who they are, what they care about, and how they influence the decision is essential BD intelligence.',
   concept:'Stakeholder mapping identifies everyone involved in a commercial decision — their role, influence, interests, and relationship with you.',
   rule:'Stakeholder map elements: (1) Decision maker (who actually says yes), (2) Influencers (who shapes the decision maker), (3) Champions (who advocates for you internally), (4) Blockers (who has reasons to resist), (5) Gatekeepers (who controls access to the decision maker).',
   explanation:'In e-commerce BD, a brand\'s "client" is rarely one person — it is typically a brand manager (day-to-day), marketing manager (campaign decisions), digital director (strategic alignment), and finance controller (budget approval).',
   why:'Influence at the right stakeholder level determines whether deals close, renew, and grow. Operating only at the brand manager level while competitors build executive relationships is a structural disadvantage.',
   hrbp:'Acting as the liaison between brand partners and agency at Momentum Commerce — this requires managing multiple stakeholder levels simultaneously: operational, strategic, and financial.',
   mistakes:['Pitching to the brand manager when the marketing director controls the budget','Neglecting the internal champion — the person inside the client organisation who advocates for you when you are not in the room'],
   scenario:'You have a strong relationship with the brand manager but your proposal has been stuck for 3 weeks without decision. What has likely happened? Answer: The proposal has moved up to a stakeholder you do not have a relationship with. Ask your brand manager: "Who else is reviewing this, and would it be helpful if I prepared a version tailored for that stakeholder?"',
   takeaway:'Map the stakeholder ecosystem before every significant commercial engagement. Identify the real decision-maker, the champion, and the blockers. Relationships at multiple levels protect against single-point-of-contact risk.'},

  {id:'sh2', title:'Managing Up — Presenting to Senior Stakeholders',
   intro:'The ability to communicate upward — to leadership, to brand executives, to C-suite — determines the size of the decisions you are trusted with.',
   concept:'Managing up means structuring information and recommendations in a way that is actionable at the seniority level of the audience.',
   rule:'Senior stakeholder communication principles: (1) Lead with the conclusion, (2) One key message per slide or talking point, (3) Data as evidence not as the content, (4) Clear recommendation with rationale, (5) Decision request made explicit.',
   explanation:'Biweekly presentations to upper management at Momentum Commerce — the discipline is: what is the one thing leadership needs to know, what action are we requesting, and what is the consequence of inaction? Everything else is appendix.',

'ops-supply': [
  {id:'ops1', title:'Inventory Management for E-Commerce',
   intro:'Inventory is the silent killer of e-commerce GMV. The campaign that sells out in hour 3 loses 85% of its potential.',
   concept:'E-commerce inventory management covers: demand forecasting, safety stock calculation, reorder point setting, warehouse preparation for campaigns, and post-campaign reconciliation.',
   rule:'Campaign inventory formula: Forecasted campaign GMV ÷ Average selling price × 1.5 safety buffer. For a RM1M campaign with RM80 ASP: 1,000,000 ÷ 80 × 1.5 = 18,750 units minimum.',
   explanation:'The 1.5× buffer accounts for: forecast error, bundle SKU complexity, and the asymmetric cost of over- vs under-stock. Over-stock: modest carrying cost. Under-stock: lost GMV, negative reviews, and seller penalty points.',
   why:'Stock-outs during campaigns destroy not just immediate GMV — they damage seller health scores, suppress future campaign eligibility, and generate negative buyer experience that impacts ratings.',
   hrbp:'Responsible for purchasing and monitoring warehouse inventory at Momentum Commerce — this means owning the demand forecast and inventory position, not just receiving information about it.',
   mistakes:['Inventory planning based on last year\'s actuals without adjustment for campaign growth expectations','Single SKU stockout crashing overall campaign — hero SKU inventory not tracked separately from long-tail'],
   scenario:'Campaign brief predicts RM600k GMV. Category average ASP is RM65. Warehouse has 7,000 units confirmed. Is this sufficient? Answer: RM600k ÷ RM65 × 1.5 = 13,846 units needed. Current stock is 7,000 — a critical 7,000-unit shortfall. Immediate escalation to warehouse and brand procurement team required.',
   takeaway:'Campaign inventory formula: GMV forecast ÷ ASP × 1.5. Apply it 30 days before every major campaign. A stockout is a preventable planning failure, not bad luck.'},

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let currentCat = null;
let currentTopic = null;
let navStack = [];   // ['home', 'category', 'topic']
let searchQ = '';

// Load saved state
let saved = {};
try { saved = JSON.parse(localStorage.getItem('sbd_v3')||'{}'); } catch(e){}
function save() { try { localStorage.setItem('sbd_v3', JSON.stringify(saved)); } catch(e){} }

// ═══════════════════════════════════════════════
// COMPUTED
// ═══════════════════════════════════════════════
function allTopics() {
  const arr = [];
  for (const [catId, topics] of Object.entries(TOPICS)) {
    topics.forEach(t => arr.push({...t, catId}));
  }
  return arr;
}

function catProgress(catId) {
  const topics = TOPICS[catId] || [];
  if (!topics.length) return 0;
  const done = topics.filter(t => saved[t.id]?.r).length;
  return Math.round(done / topics.length * 100);
}

function globalProgress() {
  const all = allTopics();
  if (!all.length) return {pct:0, read:0, bkm:0, total:all.length};
  const read = all.filter(t => saved[t.id]?.r).length;
  const bkm = all.filter(t => saved[t.id]?.b).length;
  return {pct: Math.round(read/all.length*100), read, bkm, total:all.length};
}

function topicsInCat(catId) { return TOPICS[catId] || []; }

// ═══════════════════════════════════════════════
// FORMATTING
// ═══════════════════════════════════════════════
function fmt(s) {
  if (!s) return '';
  return s
    .split(/\*\*(.+?)\*\*/g)
    .map((seg,i) => i%2===1
      ? '<strong>'+seg.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</strong>'
      : seg.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'))
    .join('')
    .replace(/\*(.+?)\*/g, (_,t) => '<em>'+t+'</em>');
}

function hl(s) {
  if (!searchQ || !s) return fmt(s);
  const re = new RegExp('('+searchQ.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return fmt(s).replace(re,'<mark>$1</mark>');
}

// ═══════════════════════════════════════════════
// SCREEN MANAGEMENT
// ═══════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');

  window.scrollTo(0,0);
}

// ═══════════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════════
function showHome() {
  currentCat = null; currentTopic = null; searchQ = '';
  const si = document.getElementById('searchInput'); if(si) si.value = '';
  renderHome();
  showScreen('home');
}

function renderHome() {
  const p = globalProgress();

  // ── Static zone (hero, progress, search) — render once, never touched by search
  const staticEl = document.getElementById('home-static');
  if (staticEl && !staticEl.dataset.rendered) {
    staticEl.dataset.rendered = '1';
    staticEl.innerHTML = `
  <div class="home-hero">
    <div class="hero-tag">🚀 Professional Learning</div>
    <div class="hero-h">The <em>Sales & BD</em> Playbook</div>
    <div class="hero-p">Master e-commerce business development, marketplace strategy, performance marketing, and account management — built from real 8-figure GMV experience.</div>
    <div class="hero-stats">
      <div class="hstat"><span class="hstat-n">${p.total}</span><span class="hstat-l">Topics</span></div>
      <div class="hstat"><span class="hstat-n">${CATS.length}</span><span class="hstat-l">Modules</span></div>
      <div class="hstat"><span class="hstat-n">${p.read}</span><span class="hstat-l">Read</span></div>
      <div class="hstat" style="margin-left:auto">
        <button class="saved-hero-btn" onclick="showBookmarks()" title="Saved topics">
          <span class="saved-ico">🔖</span>
          <span class="saved-ct">${p.bkm}</span>
          <span class="hstat-l">Saved</span>
        </button>
      </div>
    </div>
  </div>
  <div class="prog-strip">
    <div class="prog-row"><span class="prog-label">Overall Progress</span><span class="prog-pct">${p.pct}%</span></div>
    <div class="prog-track"><div class="prog-fill" style="width:${p.pct}%"></div></div>
    <div class="prog-meta">
      <div class="pmeta"><div class="pmeta-dot" style="background:var(--green)"></div>${p.read} Read</div>
      <div class="pmeta"><div class="pmeta-dot" style="background:var(--green2)"></div>${p.bkm} Saved</div>
    </div>
  </div>
  <div class="persistent-search" id="persistentSearch">
    <div class="psearch-inner">
      <span class="sico">⌕</span>
      <input id="searchInput" type="search" placeholder="Search topics…" autocomplete="off">
    </div>
  </div>`;
  } else if (staticEl) {
    // Update progress numbers without re-rendering (keeps input alive)
    const pctEl = staticEl.querySelector('.prog-pct');
    const fillEl = staticEl.querySelector('.prog-fill');
    const readEl = staticEl.querySelectorAll('.pmeta')[0];
    const bkmEl = staticEl.querySelectorAll('.pmeta')[1];
    const savedCt = staticEl.querySelector('.saved-ct');
    if (pctEl) pctEl.textContent = p.pct + '%';
    if (fillEl) fillEl.style.width = p.pct + '%';
    if (readEl) readEl.innerHTML = `<div class="pmeta-dot" style="background:var(--green)"></div>${p.read} Read`;
    if (bkmEl) bkmEl.innerHTML = `<div class="pmeta-dot" style="background:var(--green2)"></div>${p.bkm} Saved`;
    if (savedCt) savedCt.textContent = p.bkm;
  }

  // ── Dynamic zone (modules grid) — always safe to replace
  renderModules();
}

function renderModules() {
  const dynEl = document.getElementById('home-dynamic');
  if (!dynEl) return;
  let html = `<div class="sec-lbl">Modules</div><div class="cat-grid">`;
  CATS.forEach(cat => {
    const pct = catProgress(cat.id);
    const cnt = topicsInCat(cat.id).length;
    html += `
    <div class="ccard" style="--ca:${cat.accent}" onclick="showCategory('${cat.id}')">
      <div class="ccard-top">
        <span class="ccard-icon">${cat.icon}</span>
        <span class="ccard-count">${cnt}</span>
      </div>
      <div class="ccard-name">${cat.name}</div>
      <div class="ccard-pb"><div class="ccard-pf" style="width:${pct}%;background:${cat.accent}"></div></div>
    </div>`;
  });
  html += `</div><div class="spacer"></div>`;
  dynEl.innerHTML = html;
}

// ═══════════════════════════════════════════════
// CATEGORY
// ═══════════════════════════════════════════════
function showCategory(catId) {
  currentCat = catId;
  renderCategory();
  showScreen('category');
}

function renderCategory() {
  const cat = CATS.find(c => c.id === currentCat);
  const topics = topicsInCat(currentCat);
  const pct = catProgress(currentCat);
  const sc = document.getElementById('screen-category');

  let html = `
  <div class="back-bar">
    <button class="back-btn-big" onclick="showHome()">
      <span class="arr">←</span> All Topics
    </button>
    <span class="back-bar-title">${pct}% complete</span>
  </div>
  <div style="padding:16px 16px 12px;border-bottom:1px solid var(--bdr)">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      <span style="font-size:26px">${cat.icon}</span>
      <div>
        <div style="font-family:'Playfair Display',serif;font-size:20px;color:var(--tx)">${cat.name}</div>
        <div style="font-size:12px;color:var(--tx3);margin-top:2px">${topics.length} topics</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div style="flex:1;height:4px;background:var(--bg5);border-radius:2px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${cat.accent};border-radius:2px;transition:width .4s"></div>
      </div>
      <span style="font-size:11.5px;color:${cat.accent};font-weight:600">${pct}%</span>
    </div>
  </div>
  <div class="tlist">`;

  topics.forEach((t, i) => {
    const st = saved[t.id] || {};
    const dotClass = st.r ? 'read' : st.b ? 'bkm' : '';
    html += `
    <div class="titem" onclick="showTopic('${currentCat}','${t.id}')">
      <span class="titem-num">${i+1}</span>
      <div class="titem-body">
        <div class="titem-title">${t.title}</div>
        <div class="titem-intro">${t.intro}</div>
      </div>
      <div class="titem-right">
        <div class="rdot ${dotClass}"></div>
        <span class="titem-arr">›</span>
      </div>
    </div>`;
  });

  html += `</div><div class="spacer"></div>`;
  sc.innerHTML = html;
}

// ═══════════════════════════════════════════════
// TOPIC READING PAGE
// ═══════════════════════════════════════════════
function showTopic(catId, topicId) {
  currentCat = catId;
  currentTopic = topicId;
  renderTopic();
  showScreen('topic');
}

function renderTopic() {
  const cat = CATS.find(c => c.id === currentCat);
  const topics = topicsInCat(currentCat);
  const idx = topics.findIndex(t => t.id === currentTopic);
  const topic = topics[idx];
  if (!topic) { showCategory(currentCat); return; }

  const st = saved[topic.id] || {};
  const isRead = !!st.r;
  const isBkm = !!st.b;
  const prevT = topics[idx-1];
  const nextT = topics[idx+1];

  let html = `
  <div class="back-bar">
    <button class="back-btn-big" onclick="showCategory('${currentCat}')">
      <span class="arr">←</span> All Topics
    </button>
    <span class="back-bar-title">${cat.name}</span>
  </div>
  <div class="reading-hero">
    <div class="reading-cat-tag">
      <div class="dot" style="background:${cat.accent}"></div>
      ${cat.name}
    </div>
    <div class="reading-title">${topic.title}</div>
    <div class="reading-intro">${topic.intro}</div>
  </div>`;

  // Content sections
  html += `<div class="rcontent">`;

  // Concept
  if (topic.concept) {
    html += `<div class="rsection">
      <div class="rsec-label">Concept</div>
      <div class="rsec-body">${fmt(topic.concept)}</div>
    </div>`;
  }

  // Rule
  if (topic.rule) {
    html += `<div class="rsection">
      <div class="rsec-label">The Rule</div>
      <div class="rsec-body">${fmt(topic.rule)}</div>
    </div>`;
  }

  // Diagram
  if (topic.diagram) {
    html += `<div class="rsection">
      <div class="diagram-wrap">${topic.diagram}</div>
    </div>`;
  }

  // Explanation
  if (topic.explanation) {
    html += `<div class="rsection">
      <div class="rsec-label">Explanation</div>
      <div class="rsec-body">${fmt(topic.explanation)}</div>
    </div>`;
  }

  // Why it exists
  if (topic.why) {
    html += `<div class="rsection">
      <div class="rsec-label">Why This Rule Exists</div>
      <div class="rsec-body">${fmt(topic.why)}</div>
    </div>`;
  }

  // HRBP angle
  if (topic.hrbp) {
    html += `<div class="rsection">
      <div class="rsec-label">HR Perspective</div>
      <div class="rsec-body">${fmt(topic.hrbp)}</div>
    </div>`;
  }

  // Common mistakes
  if (topic.mistakes && topic.mistakes.length) {
    html += `<div class="rsection">
      <div class="rsec-label">Common Mistakes</div>
      <ul class="mistake-list">`;
    topic.mistakes.forEach(m => {
      html += `<li><span class="mico">⚠️</span>${fmt(m)}</li>`;
    });
    html += `</ul></div>`;
  }

  // Scenario
  if (topic.scenario) {
    const ansIdx = topic.scenario.indexOf('Answer:');
    if (ansIdx > -1) {
      const q = topic.scenario.substring(0, ansIdx).trim();
      const a = topic.scenario.substring(ansIdx).trim();
      html += `<div class="rsection">
        <div class="rsec-label">Scenario</div>
        <div class="scenario">${fmt(q)}<div class="scenario-ans">${fmt(a)}</div></div>
      </div>`;
    } else {
      html += `<div class="rsection">
        <div class="rsec-label">Scenario</div>
        <div class="scenario">${fmt(topic.scenario)}</div>
      </div>`;
    }
  }

  // Law reference
  if (topic.law) {
    html += `<div class="rsection">
      <div class="rsec-label">Legal Reference</div>
      <span class="lawchip">${fmt(topic.law)}</span>
    </div>`;
  }

  // Key takeaway
  if (topic.takeaway) {
    html += `<div class="rsection">
      <div class="takeaway-lbl">Key Takeaway</div>
      <div class="takeaway">${fmt(topic.takeaway)}</div>
    </div>`;
  }

  html += `</div>`;

  // Actions bar (sticky)
  html += `
  <div class="reading-actions">
    <button class="btn-alltopics" onclick="showCategory('${currentCat}')">
      ← Topics
    </button>
    <button class="btn-read ${isRead?'done':''}" onclick="toggleRead('${topic.id}')">
      ${isRead ? '✓ Read' : '○ Read'}
    </button>
    <button class="btn-bkm ${isBkm?'on':''}" onclick="toggleBkm('${topic.id}')" title="Bookmark">🔖</button>
    <button class="btn-nav-next" onclick="showTopic('${currentCat}','${nextT?.id}')" ${!nextT?'disabled':''}>
      ${idx+1}/${topics.length} ${nextT ? '· Next →' : '· End'}
    </button>
  </div>`;

  // Topic position indicator
  html += `<div class="tnav"><span>${idx+1} of ${topics.length}</span><strong>${cat.name}</strong></div>`;
  html += `<div class="spacer"></div>`;

  document.getElementById('screen-topic').innerHTML = html;
}

function toggleRead(topicId) {
  saved[topicId] = saved[topicId] || {};
  saved[topicId].r = !saved[topicId].r;
  save();
  renderTopic();
}

function toggleBkm(topicId) {
  saved[topicId] = saved[topicId] || {};
  saved[topicId].b = !saved[topicId].b;
  save();
  renderTopic();
}

// ═══════════════════════════════════════════════
// BOOKMARKS
// ═══════════════════════════════════════════════
function showBookmarks() {
  renderBookmarks();
  showScreen('bookmarks');
}

function renderBookmarks() {
  const all = allTopics();
  const bkm = all.filter(t => saved[t.id]?.b);
  const read = all.filter(t => saved[t.id]?.r);
  const sc = document.getElementById('screen-bookmarks');

  let html = `
  <div class="back-bar">
    <button class="back-btn-big" onclick="showHome()">
      <span class="arr">←</span> Home
    </button>
  </div>
  <div style="padding:16px 16px 12px;border-bottom:1px solid var(--bdr)">
    <div style="font-family:'Playfair Display',serif;font-size:22px;color:var(--tx);margin-bottom:4px">Saved Topics</div>
    <div style="font-size:12.5px;color:var(--tx3)">${bkm.length} bookmarked · ${read.length} read</div>
  </div>`;

  if (!bkm.length) {
    html += `<div class="empty-state">
      <div class="empty-ico">🔖</div>
      <div class="empty-msg">No bookmarks yet.<br>Tap 🔖 on any topic to save it here.</div>
    </div>`;
  } else {
    html += `<div class="tlist">`;
    bkm.forEach(t => {
      const cat = CATS.find(c => c.id === t.catId);
      html += `
      <div class="titem" onclick="showTopic('${t.catId}','${t.id}')">
        <span class="titem-num" style="color:${cat?.accent}">${cat?.icon}</span>
        <div class="titem-body">
          <div class="titem-title">${t.title}</div>
          <div class="titem-intro">${cat?.name}</div>
        </div>
        <div class="titem-right">
          <div class="rdot ${saved[t.id]?.r?'read':'bkm'}"></div>
          <span class="titem-arr">›</span>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  if (read.length > 0) {
    html += `
    <div class="sec-lbl">Read Topics (${read.length})</div>
    <div class="tlist">`;
    read.forEach(t => {
      const cat = CATS.find(c => c.id === t.catId);
      html += `
      <div class="titem" onclick="showTopic('${t.catId}','${t.id}')">
        <span class="titem-num" style="color:${cat?.accent}">${cat?.icon}</span>
        <div class="titem-body">
          <div class="titem-title">${t.title}</div>
          <div class="titem-intro">${cat?.name}</div>
        </div>
        <div class="titem-right">
          <div class="rdot read"></div>
          <span class="titem-arr">›</span>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  html += `<div class="spacer"></div>`;
  sc.innerHTML = html;
}

// ═══════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════
// Delegated search — results render inline, input keeps focus
document.addEventListener('input', function(e) {
  if (e.target && e.target.id === 'searchInput') {
    searchQ = e.target.value.trim();
    renderHomeWithSearch(); // always stay on home screen, just swap content
  }
});

// Renders home screen with search results inline (no screen switch)
function renderHomeWithSearch() {
  if (searchQ.length === 0) {
    renderModules();
    return;
  }
  const q = searchQ.toLowerCase();
  const all = allTopics();
  const results = all.filter(t =>
    t.title.toLowerCase().includes(q) ||
    (t.intro||'').toLowerCase().includes(q) ||
    (t.concept||'').toLowerCase().includes(q) ||
    (t.rule||'').toLowerCase().includes(q) ||
    (t.explanation||'').toLowerCase().includes(q) ||
    (t.law||'').toLowerCase().includes(q)
  );
  const dynEl = document.getElementById('home-dynamic');
  if (!dynEl) return;
  let html = `<div class="search-meta-inline">${results.length} result${results.length!==1?'s':''} for <strong>"${searchQ}"</strong></div>`;
  if (!results.length) {
    html += `<div class="empty-state"><div class="empty-ico">🔍</div><div class="empty-msg">No topics found.<br>Try a different keyword.</div></div>`;
  } else {
    html += `<div class="tlist">`;
    results.forEach(t => {
      const cat = CATS.find(c => c.id === t.catId);
      html += `<div class="titem" onclick="showTopic('${t.catId}','${t.id}')">
        <span class="titem-num" style="color:${cat?.accent}">${cat?.icon}</span>
        <div class="titem-body"><div class="titem-title">${hl(t.title)}</div><div class="titem-intro">${hl(t.intro)}</div></div>
        <div class="titem-right"><div class="rdot ${saved[t.id]?.r?'read':saved[t.id]?.b?'bkm':''}"></div><span class="titem-arr">›</span></div>
      </div>`;
    });
    html += `</div>`;
  }
  html += `<div class="spacer"></div>`;
  dynEl.innerHTML = html;
}

function renderSearch() {
  const q = searchQ.toLowerCase();
  const all = allTopics();
  const results = all.filter(t =>
    t.title.toLowerCase().includes(q) ||
    (t.intro||'').toLowerCase().includes(q) ||
    (t.concept||'').toLowerCase().includes(q) ||
    (t.rule||'').toLowerCase().includes(q) ||
    (t.explanation||'').toLowerCase().includes(q) ||
    (t.law||'').toLowerCase().includes(q)
  );

  let html = `
  <div class="back-bar">
    <button class="back-btn-big" onclick="showHome();document.getElementById('searchInput').value='';searchQ='';">
      <span class="arr">←</span> All Topics
    </button>
    <span class="back-bar-title">${results.length} result${results.length!==1?'s':''}</span>
  </div>`;
  if (!results.length) {
    html += `<div class="empty-state"><div class="empty-ico">🔍</div><div class="empty-msg">No topics found.<br>Try a different keyword.</div></div>`;
  } else {
    html += `<div class="tlist">`;
    results.forEach(t => {
      const cat = CATS.find(c => c.id === t.catId);
      html += `
      <div class="titem" onclick="showTopic('${t.catId}','${t.id}')">
        <span class="titem-num" style="color:${cat?.accent}">${cat?.icon}</span>
        <div class="titem-body">
          <div class="titem-title">${hl(t.title)}</div>
          <div class="titem-intro">${hl(t.intro)}</div>
        </div>
        <div class="titem-right">
          <div class="rdot ${saved[t.id]?.r?'read':saved[t.id]?.b?'bkm':''}"></div>
          <span class="titem-arr">›</span>
        </div>
      </div>`;
    });
    html += `</div>`;
  }
  document.getElementById('screen-search').innerHTML = html;
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════

showHome();
</script>
</body>
</html>
